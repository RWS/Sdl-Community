resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - DeepL Translation Provider/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - DeepL Translation Provider/*
pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: jobs/branch-variables.yml
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value : '**/Sdl.Community.DeepLMTProvider.sln'
- name: pathToPublish
  value: '$(PluginPath)\Sdl.Community.DeepLMTProvider.sdlplugin'

steps:
  - checkout: self
  - checkout: AppStoreApplicationsRepo
  - template: jobs/build-sdlplugin.yml
  - template: jobs/publish-build-artifact-task.yml
