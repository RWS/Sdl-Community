resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Anonymizer/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Anonymizer/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: build/branch-variables.yml@AppStoreApplicationsRepo
- name: buildPlatform 
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value: '**/Sdl.Community.projectAnonymizer.sln'
- name: pathToPublish
  value: 'Anonymizer\Anonymizer\bin\Release\Sdl.Community.projectAnonymizer.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

