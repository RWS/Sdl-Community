resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - SDLMTCloud.Provider/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - SDLMTCloud.Provider/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: jobs/branch-variables.yml
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution 
  value: '**/Sdl.Community.MTCloud.Provider.sln'
- name: pathToPublish
  value: 'SDLMTCloud.Provider\Sdl.Community.MTCloud.Provider\bin\Release\LanguageWeaver.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

