resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - TmAnonymizer/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - TmAnonymizer/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: jobs/branch-variables.yml
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution 
  value: '**/Sdl.Community.SdlTmAnonymizer.sln'
- name: pathToPublish
  value: 'TmAnonymizer/Sdl.Community.TmAnonymizer\bin\Release\Sdl.Community.SdlTmAnonymizer.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

