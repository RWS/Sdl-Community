trigger:
  branches:
    include:
     - master
  paths:
    include:
     - Verify Files – Audit Report/*

pr:
  branches:
    include:
     - master
  paths:
    include:
     - Verify Files – Audit Report/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: jobs/branch-variables.yml
- name: buildPlatform 
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value: '**/VerifyFilesAuditReport.sln'

steps:
  - template: jobs/build-sdlplugin.yml
  - template: jobs/publish-build-artifact-task.yml