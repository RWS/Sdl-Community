resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Trados Studio InQuote/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Trados Studio InQuote/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: build/branch-variables.yml@AppStoreApplicationsRepo
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value : '**/Sdl.Community.InvoiceAndQuotes.sln'
- name: pathToPublish
  value: '$(PluginPath)\Sdl.Community.InvoiceAndQuotes.Integration.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

