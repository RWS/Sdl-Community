resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - TAUS Data Search/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - TAUS Data Search/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: build/branch-variables.yml@AppStoreApplicationsRepo
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution 
  value:  '**/Sdl.Community.Taus.Translation.Provider.sln'
- name: pathToPublish
  value: 'TAUS Data Search/Sdl.Community.Taus.Translation.Provider\bin\Release\Sdl.Community.Taus.Translation.Provider.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

