resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Reports Viewer Plus/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Reports Viewer Plus/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- group: 'SDLPLC Authenticode Credentials'
- template: jobs/branch-variables.yml
- name: buildPlatform 
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value: '**/Reports.Viewer.sln'
- name: pathToPublish
  value: '$(PluginPath)\Reports.Viewer.Plus.sdlplugin'
- name: outputpath
  value: '$(Build.Repository.LocalPath)\Reports Viewer Plus\Reports.Viewer\bin\$(buildConfiguration)\net48'
steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

