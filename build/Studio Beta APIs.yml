resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Studio Beta APIs/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - Studio Beta APIs/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: build/branch-variables.yml@AppStoreApplicationsRepo
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution 
  value: '**/SDL.Community.BetaAPIs.sln'
- name: pathToPublish
  value: 'Studio Beta APIs\SDL.Community.BetaAPIs\Sdl.Community.BetaAPIs.UI\bin\Release\Sdl.Community.BetaAPIs.UI.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

