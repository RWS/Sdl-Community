resources:
  repositories:
  - repository: AppStoreApplicationsRepo
    type: git
    name: AppStoreApplications/AppStoreApplications
    ref: 'Studio_2026'

trigger:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - MT Enhanced Provider/*

pr:
  branches:
    include:
     - Studio_2026
  paths:
    include:
     - MT Enhanced Provider/*

pool: 
  vmImage : '$(DefaultBuildVm)'

variables:
- template: build/branch-variables.yml@AppStoreApplicationsRepo
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: solution
  value :  '**/Sdl.Community.MtEnhancedProvider.sln'
- name: pathToPublish
  value: 'MT Enhanced Provider\Sdl.Community.MtEnhancedProvider\bin\debug\Sdl.Community.MtEnhancedProvider.sdlplugin'

steps:
  - template: build/jobs/build-sdlplugin.yml@AppStoreApplicationsRepo
  - template: build/jobs/publish-build-artifact-task.yml@AppStoreApplicationsRepo

